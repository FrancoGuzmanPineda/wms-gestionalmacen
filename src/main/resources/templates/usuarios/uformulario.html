<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Usuario - WMS</title>
    <link rel="stylesheet" th:href="@{/css/inventario.css}">
    <link rel="stylesheet" th:href="@{/css/uformulario.css}">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <h2>WMS</h2>
                <p>Sistema de Gestión de Almacenes</p>
            </div>

            <nav>
                <a th:href="@{/dashboard}">Dashboard</a>
                <a th:href="@{/inventario}">Inventario</a>
                <a th:href="@{/recepcion}">Recepciones</a>
                    <a th:href="@{/reportes}">Reportes</a>
                <a th:href="@{/usuarios}" class="active">Usuarios</a>
                <a th:href="@{/logout}">Cerrar sesión</a>
            </nav>
        </aside>

        <main class="main">

            <header class="topbar">
                <h3 th:text="${modoEdicion} ? 'Editar Usuario' : 'Nuevo Usuario'">Nuevo Usuario</h3>

                <span>
                    <strong th:text="${nombre}">Usuario</strong>
                    |
                    <small th:text="${rol}">ROL</small>
                </span>
            </header>

            <section class="content">

                <div class="page-header">
                    <div>
                        <h1>Gestión de Usuarios</h1>
                        <p th:text="${modoEdicion} ? 'Actualizar información del usuario' : 'Registrar un nuevo usuario en el sistema'">Registrar un nuevo usuario en el sistema</p>
                    </div>

                    <div class="buttons">
                        <a th:href="@{/usuarios}" class="btn secondary">Volver a Usuarios</a>
                    </div>
                </div>

                <div class="card" style="padding: 30px;">
                    <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
                        <input type="hidden" th:field="*{idusuario}">
                    
                        <div class="form-group">
                            <label for="nombre">Nombre Completo:</label>
                            <input type="text" id="nombre" th:field="*{nombre}" class="form-control" required>
                        </div>
                    
                        <div class="form-group">
                            <label for="correo">Correo Electrónico:</label>
                            <input type="email" id="correo" th:field="*{correo}" class="form-control" required>
                        </div>
                    
                        <!-- ✅ FILA DE 2 COLUMNAS: Contraseña y Rol -->
                        <div class="form-row">
                            <div class="form-group half">
                                <label for="clave">Contraseña:</label>
                                <input type="password" id="clave" th:field="*{clave}" class="form-control" th:required="${!modoEdicion}" placeholder="En edición, dejar vacío para mantener la contraseña actual">
                            </div>
                    
                            <div class="form-group half">
                                <label for="rol">Rol:</label>
                                <select id="rol" th:field="*{rol}" class="form-control" required>
                                    <option value="">Seleccionar...</option>
                                    <option value="ADMIN">Administrador</option>
                                    <option value="SUPERVISOR">Supervisor</option>
                                </select>
                            </div>
                        </div>
                    
                        <div class="form-group checkbox-group">
                            <label for="estado">
                                <span>Estado:</span>
                                <input type="checkbox" id="estado" th:field="*{estado}" checked>
                            </label>
                        </div>
                    
                        <div class="form-actions">
                            <button type="submit" class="btn primary" th:text="${modoEdicion} ? 'Actualizar Usuario' : 'Guardar Usuario'">Guardar Usuario</button>
                            <a th:href="@{/usuarios}" class="btn secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
