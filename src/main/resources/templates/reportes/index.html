<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reportes - WMS</title>
    <link rel="stylesheet" th:href="@{/css/inventario.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
</head>
<body>

<div class="layout">

    <th:block th:replace="~{fragments/sidebar :: sidebar(seccionActiva='reportes')}"></th:block>

    <main class="main">

        <header class="topbar">
            <h3>Módulo de Reportes</h3>
        </header>

        <section class="content">

            <div class="page-header">
                <h1>Reportes del Sistema</h1>
                <p>Seleccione el reporte que desea consultar</p>
            </div>

            <div class="card">
                <h2>Reporte de Entradas</h2>
                <a th:href="@{/reportes/entradas}" class="btn primary">
                    Ver Reporte
                </a>
            </div>

            <br>

            <div class="card">
                <h2>Reporte de Salidas</h2>
                <a th:href="@{/reportes/salidas}" class="btn primary">
                    Ver Reporte
                </a>
            </div>

            <br>

            <div class="card">
                <h2>Reporte General de Inventario</h2>
                <a th:href="@{/reportes/inventario}" class="btn primary">
                    Ver Reporte
                </a>
            </div>

        </section>

    </main>

</div>

</body>
</html>
