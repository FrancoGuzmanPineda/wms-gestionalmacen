<!DOCTYPE html>

<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte de Salidas - WMS</title>
    <link rel="stylesheet" th:href="@{/css/inventario.css}">
</head>
<body>

<div class="layout">

```
<aside class="sidebar">
    <div class="logo">
        <h2>WMS</h2>
        <p>Sistema de Gestión de Almacenes</p>
    </div>

    <nav>
        <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/inventario}">Inventario</a>
            <a th:href="@{/recepcion}">Recepciones</a>
            <a th:href="@{/reportes}" class="active">Reportes</a>
            <a th:if="${rol == 'ADMIN'}" th:href="@{/usuarios}">Usuarios</a>
            <a th:href="@{/logout}">Cerrar sesión</a>
    </nav>
</aside>

<main class="main">

    <header class="topbar">
        <h3>Reporte de Salidas</h3>
    </header>

    <section class="content">

        <div class="page-header">
            <h1>Reporte de Salidas</h1>
        </div>

        <div class="card">

            <form method="get" th:action="@{/reportes/salidas}">
                <div class="filters">
                    <input type="date" name="fechaInicio" th:value="${fechaInicio}">
                    <input type="date" name="fechaFin" th:value="${fechaFin}">
                    <button type="submit">Filtrar</button>
                </div>
            </form>

            <table>
                <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Ubicación</th>
                    <th>Fecha</th>
                    <th>Usuario</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="movimiento : ${movimientos}">
                    <td th:text="${movimiento.producto.codigo}"></td>
                    <td th:text="${movimiento.producto.nombre}"></td>
                    <td th:text="${movimiento.cantidad}"></td>
                    <td th:text="${movimiento.ubicacion.codigoEstante}"></td>
                    <td th:text="${movimiento.fecha}"></td>
                    <td th:text="${movimiento.usuario.nombre}"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(movimientos)}">
                    <td colspan="6" class="empty">
                        No existen salidas registradas.
                    </td>
                </tr>

                </tbody>
            </table>

        </div>

    </section>

</main>
```

</div>

</body>
</html>
