<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleado - WMS Gestionalmacén</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/empleado.css}">
</head>
<body>
    <nav class="navbar navbar-custom p-3">
        <div class="container-fluid">
            <span class="navbar-brand text-white">🏭 WMS Gestionalmacén - Empleado</span>
            <div>
                <span class="text-white me-3">👔 <strong th:text="${email}"></strong></span>
                <a href="/logout" class="btn btn-logout">Cerrar Sesión</a>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-4"><div class="card card-stats bg-success text-white p-3"><h5>Productos</h5><h2>1,234</h2></div></div>
            <div class="col-md-4"><div class="card card-stats bg-warning text-white p-3"><h5>Órdenes Pendientes</h5><h2>42</h2></div></div>
            <div class="col-md-4"><div class="card card-stats bg-info text-white p-3"><h5>Stock Bajo</h5><h2>8</h2></div></div>
        </div>
        
        <div class="card">
            <div class="card-header">📦 Módulos Disponibles</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4 mb-3"><button class="btn btn-outline-success w-100">📦 Inventario</button></div>
                    <div class="col-md-4 mb-3"><button class="btn btn-outline-primary w-100">🏷️ Productos</button></div>
                    <div class="col-md-4 mb-3"><button class="btn btn-outline-warning w-100">🛒 Órdenes</button></div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
