<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movimientos de ingreso - WMS</title>
    <link rel="stylesheet" th:href="@{/css/inventario.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
</head>
<body>
<div class="layout">
    <th:block th:replace="~{fragments/sidebar :: sidebar(seccionActiva='inventario')}"></th:block>

    <main class="main">
        <header class="topbar">
            <h3>Movimientos de Ingreso</h3>
            <span>
                <strong th:text="${nombre}">Usuario</strong>
                |
                <small th:text="${rol}">ROL</small>
            </span>
        </header>

        <section class="content">
            <div class="page-header">
                <div>
                    <h1>Movimientos de Ingreso</h1>
                    <p>Historial de ingresos de mercancía al almacén</p>
                </div>
                <div class="buttons">
                    <a th:href="@{/inventario}" class="btn secondary">Volver a Inventario</a>
                </div>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Ubicación</th>
                            <th>Usuario</th>
                            <th>Movimiento</th>
                            <th>Observación</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="movimiento : ${movimientos}">
                            <td th:text="${movimiento.fecha != null ? #temporals.format(movimiento.fecha, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                            <td th:text="${movimiento.producto != null ? movimiento.producto.nombre : '-'}">Producto</td>
                            <td th:text="${movimiento.cantidad}">0</td>
                            <td th:text="${movimiento.ubicacion != null ? movimiento.ubicacion.codigoEstante : '-'}">-</td>
                            <td th:text="${movimiento.usuario != null ? movimiento.usuario.nombre : '-'}">Usuario</td>
                            <td>
                                <span class="badge success" th:text="${movimiento.tipoMovimiento}">Ingreso</span>
                            </td>
                            <td th:text="${movimiento.observacion != null and !#strings.isEmpty(movimiento.observacion) ? movimiento.observacion : 'Sin observación'}">Sin observación</td>
                        </tr>

                        <tr th:if="${movimientos == null or #lists.isEmpty(movimientos)}">
                            <td colspan="7" class="empty">No hay movimientos de ingreso registrados.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
