<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin -Gestionalmacén</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-3">
                <h4 class="text-white mb-4">🏭 Admin</h4>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="#">📊 Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">👥 Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">📦 Inventario</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">🏷️ Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">📈 Reportes</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">⚙️ Configuración</a></li>
                </ul>
                <hr class="bg-secondary">
                <a href="/logout" class="btn btn-danger w-100">🚪 Cerrar Sesión</a>
            </div>
            
            <!-- Main Content -->
            <div class="col-md-10 content">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2>Panel de Administrador</h2>
                    <div class="bg-white p-2 rounded shadow-sm">
                        <span>👑 <strong th:text="${email}"></strong></span>
                    </div>
                </div>
                
                <div class="row mb-4">
                    <div class="col-md-3"><div class="card card-stats p-3"><h5>Usuarios</h5><h2>15</h2></div></div>
                    <div class="col-md-3"><div class="card card-stats p-3"><h5>Productos</h5><h2>1,234</h2></div></div>
                    <div class="col-md-3"><div class="card card-stats p-3"><h5>Órdenes</h5><h2>42</h2></div></div>
                    <div class="col-md-3"><div class="card card-stats p-3"><h5>Stock Bajo</h5><h2>8</h2></div></div>
                </div>
                
                <div class="card">
                    <div class="card-header">📋 Acciones Rápidas</div>
                    <div class="card-body">
                        <button class="btn btn-primary m-1">➕ Crear Usuario</button>
                        <button class="btn btn-success m-1">📦 Agregar Producto</button>
                        <button class="btn btn-warning m-1">📊 Generar Reporte</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
