<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - Restablecer contraseña</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-card">
    <div class="card-header">
        <h1>Restablecer contraseña</h1>
        <p>El enlace es temporal y solo puede utilizarse una vez</p>
    </div>

    <div class="card-body">
        <div th:if="${mensajeError}" class="error-message show">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${mensajeError}"></span>
        </div>

        <form th:if="${tokenValido}"
              method="post"
              th:action="@{/restablecer-password}">
            <input type="hidden" name="token" th:value="${token}">

            <div class="input-group">
                <label for="nuevaClave">
                    <i class="fas fa-lock"></i> Nueva contraseña
                </label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password"
                           id="nuevaClave"
                           name="nuevaClave"
                           minlength="8"
                           autocomplete="new-password"
                           placeholder="Mínimo 8 caracteres"
                           required>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmarClave">
                    <i class="fas fa-check-circle"></i> Confirmar contraseña
                </label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password"
                           id="confirmarClave"
                           name="confirmarClave"
                           minlength="8"
                           autocomplete="new-password"
                           placeholder="Repita la contraseña"
                           required>
                </div>
            </div>

            <div class="help-text">
                La contraseña debe contener al menos 8 caracteres.
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-save"></i> Actualizar contraseña
            </button>
        </form>

        <div class="center-link">
            <a th:if="${!tokenValido}"
               class="forgot-link"
               th:href="@{/recuperar-password}">
                Solicitar un nuevo enlace
            </a>
            <a class="forgot-link" th:href="@{/login}">
                Volver al inicio de sesión
            </a>
        </div>
    </div>

    <div class="card-footer">
        <div class="wms-brand">WMS</div>
        <div class="wms-sub">Sistema de Gestión de Almacenes</div>
    </div>
</div>
</body>
</html>
