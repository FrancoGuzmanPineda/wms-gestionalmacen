<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS Gestionalmacén</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-md-5 col-lg-4">
        <div class="card login-card">
            <div class="card-header default" id="cardHeader">
                <h2>🏭 WMS Gestionalmacén</h2>
                <p>Sistema de Gestión de Almacén</p>
            </div>
            <div class="card-body" id="cardBody">
                <!-- Selector de roles -->
                <div class="row g-3 mb-4">
                    <div class="col">
                        <div class="role-option usuario" data-rol="USER" data-color="usuario">
                            <div class="role-icon-container icon-bg-user">
                                <svg viewBox="0 0 24 24" class="svg-icon-user">
                                    <path
                                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                                </svg>
                            </div>
                            <h4>Usuario</h4>
                            <p>Acceso</p>
                        </div>
                    </div>
                    <div class="col">
                        <div class="role-option empleado" data-rol="EMPLOYEE" data-color="empleado">
                            <div class="role-icon-container icon-bg-employee">
                                <svg viewBox="0 0 24 24" class="svg-icon-employee">
                                    <path
                                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                                </svg>
                            </div>
                            <h4>Empleado</h4>
                            <p>Operaciones</p>
                        </div>
                    </div>
                    <div class="col">
                        <div class="role-option admin" data-rol="ADMIN" data-color="admin">
                            <div class="role-icon-container icon-bg-admin">
                                <svg viewBox="0 0 24 24" class="svg-icon-admin">
                                    <path
                                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                                </svg>
                            </div>
                            <h4>Administrador</h4>
                            <p>Control</p>
                        </div>
                    </div>
                </div>

                <!-- Formulario de login -->
                <div id="loginFormContainer" style="display: none;">
                    <div id="errorMsg" class="alert alert-danger alert-custom" style="display: none;"></div>
                    <div id="countdownMsg" class="countdown-timer" style="display: none;"></div>
                    
                    <form method="post" th:action="@{/login}" id="loginForm">
                        <div class="mb-3">
                            <input type="email" name="email" id="email" class="form-control" placeholder="Correo electrónico" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" name="password" id="password" class="form-control" placeholder="Contraseña" required>
                        </div>
                        <button type="submit" class="btn-login" id="btnLogin">Ingresar</button>
                    </form>
                    
                    <div class="forgot-link">
                        <a th:href="@{/recuperarclave}" class="link-primary text-decoration-none small">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

                <!-- Botón Admin (solo visible si selecciona ADMIN) -->
                <div id="adminActions" class="admin-actions" style="display: none;">
                    <button class="btn-admin" onclick="abrirModalUsuario()">➕ Agregar Nuevo Usuario</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Cambiar Contraseña -->
<div class="modal fade" id="modalPassword" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content modal-content-custom">
            <div class="modal-header-custom">
                <h5 class="mb-0">🔑 Cambiar Contraseña</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="email" id="cambioEmail" class="form-control mb-3" placeholder="Email" required>
                <input type="password" id="actualPassword" class="form-control mb-3" placeholder="Contraseña actual" required>
                <input type="password" id="nuevaPassword" class="form-control mb-3" placeholder="Nueva contraseña" required>
                <input type="password" id="confirmarPassword" class="form-control mb-3" placeholder="Confirmar contraseña" required>
                <button class="btn btn-primary w-100" onclick="cambiarPassword()">Actualizar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal Crear Usuario -->
<div class="modal fade" id="modalUsuario" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content modal-content-custom">
            <div class="modal-header-custom" style="background: linear-gradient(135deg, #cb2d3e, #ef473a);">
                <h5 class="mb-0">➕ Crear Nuevo Usuario</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <input type="text" id="nuevoNombre" class="form-control mb-3" placeholder="Nombre completo" required>
                <input type="email" id="nuevoEmail" class="form-control mb-3" placeholder="Email" required>
                <input type="password" id="nuevoPassword" class="form-control mb-3" placeholder="Contraseña" required>
                <select id="nuevoRol" class="form-select mb-3">
                    <option value="USER">Usuario</option>
                    <option value="EMPLOYEE">Empleado</option>
                    <option value="ADMIN">Administrador</option>
                </select>
                <button class="btn btn-danger w-100" onclick="crearUsuario()">Crear Usuario</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script th:src="@{/js/login.js}" defer></script>
</body>
</html>
