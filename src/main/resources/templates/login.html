<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - Iniciar Sesión</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
          integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA=="
          crossorigin="anonymous"
          referrerpolicy="no-referrer">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-card">
    <div class="card-header">
        <h1>Iniciar Sesión</h1>
        <p>Ingrese sus credenciales para acceder al sistema</p>
    </div>

    <div class="card-body">
        <div id="errorMsg" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>Usuario o contraseña incorrectos. Intente de nuevo.</span>
        </div>

        <div th:if="${passwordResetSuccess}" class="success-message show">
            <i class="fas fa-check-circle"></i>
            <span th:text="${passwordResetSuccess}"></span>
        </div>

        <form id="loginForm" method="post" th:action="@{/perform_login}">
            <div class="input-group">
                <label for="username"><i class="fas fa-user-circle"></i> Usuario</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text"
                           id="username"
                           name="username"
                           placeholder="Ingrese su usuario"
                           autocomplete="username"
                           required>
                </div>
            </div>

            <div class="input-group">
                <label for="password"><i class="fas fa-lock"></i> Contraseña</label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password"
                           id="password"
                           name="password"
                           placeholder="Ingrese su contraseña"
                           autocomplete="current-password"
                           required>
                </div>
            </div>

            <div class="options-row">
                <label class="checkbox-label">
                    <input type="checkbox" id="rememberMe">
                    <span>Recordar usuario</span>
                </label>

                <a class="forgot-link" th:href="@{/recuperar-password}">
                    ¿Olvidó su contraseña?
                </a>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
            </button>
        </form>
    </div>

    <div class="card-footer">
        <div class="wms-brand">WMS</div>
        <div class="wms-sub">Sistema de Gestión de Almacenes</div>
        <div class="security-note">
            <i class="fas fa-shield-alt"></i>
            <span>Acceso seguro y autorizado. Todos los derechos reservados.</span>
        </div>
    </div>
</div>

<script th:src="@{/js/login.js}" defer></script>
</body>
</html>
