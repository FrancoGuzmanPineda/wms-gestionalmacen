<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS - Recuperar contraseña</title>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-card">
    <div class="card-header">
        <h1>Recuperar contraseña</h1>
        <p>Genere un enlace temporal para restablecer su acceso</p>
    </div>

    <div class="card-body">
        <div th:if="${mensajeExito}" class="success-message show">
            <i class="fas fa-check-circle"></i>
            <span th:text="${mensajeExito}"></span>
        </div>

        <div class="help-text">
            Por seguridad, el sistema no confirma si el correo existe.
            En esta versión académica, el enlace se muestra en la consola
            donde se ejecuta Spring Boot.
        </div>

        <form method="post" th:action="@{/recuperar-password}">
            <div class="input-group">
                <label for="correo">
                    <i class="fas fa-envelope"></i> Correo registrado
                </label>
                <div class="input-icon-wrapper">
                    <i class="fas fa-at input-icon"></i>
                    <input type="email"
                           id="correo"
                           name="correo"
                           placeholder="usuario@wms.com"
                           autocomplete="email"
                           required>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-link"></i> Generar enlace
            </button>
        </form>

        <div class="center-link">
            <a class="forgot-link" th:href="@{/login}">
                <i class="fas fa-arrow-left"></i> Volver al inicio de sesión
            </a>
        </div>
    </div>

    <div class="card-footer">
        <div class="wms-brand">WMS</div>
        <div class="wms-sub">Sistema de Gestión de Almacenes</div>
    </div>
</div>
</body>
</html>
