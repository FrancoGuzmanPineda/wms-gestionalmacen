spring.application.name=gestionalmaceng01

spring.datasource.url=jdbc:mysql://localhost:3306/bdgestionalmaceng01?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima

spring.datasource.username=root
spring.datasource.password=locura32147

# DRIVER MYSQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# CONFIGURACIÓN JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DIALECTO MYSQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.servlet.session.timeout=30m
server.error.whitelabel.enabled=false

spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Configuración de recursos estáticos
spring.web.resources.add-mappings=true
spring.web.resources.chain.cache=false
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/js/**,/css/**

# URL utilizada para construir enlaces de recuperación en entorno local
app.base-url=http://localhost:8080

# Apertura automática del navegador al iniciar la aplicación.
app.browser.enabled=true

logging.file.name=logs/bdgestionalmaceng01.log

logging.logback.rollingpolicy.file-name-pattern=logs/bdgestionalmaceng01.%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=20KB
logging.logback.rollingpolicy.max-history=10
logging.logback.rollingpolicy.total-size-cap=200MB

logging.level.root=INFO